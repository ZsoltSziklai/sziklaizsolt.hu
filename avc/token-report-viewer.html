<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Token-statisztika — Sziklai Zsolt · AvC</title>
  <meta name="description" content="AI ágensek tokenhasználata és költségriport — Agentic Vibe Coding projekt." />
  <meta name="robots" content="index, follow" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="viewer.css" />
  <script defer src="https://cloud.umami.is/script.js" data-website-id="c087626e-16ed-4ddf-ae66-d6de1ec5a588"></script>
</head>
<body>
  <main class="viewer">
    <div class="viewer__topbar">
      <a class="back-link" href="index.html#projects" id="back-link">
        <svg viewBox="0 0 16 16" fill="none"><path d="M13 8H3M3 8l4-4M3 8l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        avc
      </a>
      <button class="theme-toggle" data-theme-toggle aria-label="Theme"></button>
    </div>

    <div class="viewer__kicker">Token-statisztika · AI költségriport</div>
    <h1 class="viewer__title" id="pname">Token report</h1>
    <p class="viewer__sub" id="pdesc"></p>

    <div id="token-mount"></div>

    <div class="v-footer">
      <span id="ftnote">A költségek az Anthropic Sonnet 4.6 / Opus 4.7 hivatalos token-árazása alapján kerültek kiszámításra.</span>
      <span id="ftdate"></span>
    </div>
  </main>

  <script src="viewer.js"></script>
  <script>
    AVCViewer.initTheme();
    AVCViewer.initBackLink();
    var p = AVCViewer.getProject();
    var mount = document.getElementById("token-mount");
    var nameEl = document.getElementById("pname");
    var descEl = document.getElementById("pdesc");

    if (!p) {
      mount.innerHTML = '<div class="unavailable">Hiányzó projekt azonosító. URL paraméter: ?p=minichat</div>';
    } else {
      nameEl.textContent = p;
      fetch(p + "/token-report.json")
        .then(function (r) { if (!r.ok) throw new Error("Token report nem található"); return r.json(); })
        .then(function (data) { renderToken(data, p); })
        .catch(function (err) {
          mount.innerHTML = '<div class="unavailable">' + AVCViewer.esc(String(err)) + "</div>";
        });
    }

    function renderToken(data, p) {
      var fmt = AVCViewer.fmt, money = AVCViewer.money, esc = AVCViewer.esc;
      document.title = "Token-statisztika — " + p + " · AvC";

      if (!data || !data.agents) {
        mount.innerHTML = '<div class="unavailable">A token statisztika nem elérhető ehhez a projekthez.</div>';
        return;
      }

      var sub = data.pipeline_subtotal || data.grand_total || {};
      var totalCost = sub.cost;

      // Compute total from agents if not present
      var agents = data.agents || {};
      if (totalCost == null) {
        totalCost = Object.keys(agents).reduce(function (acc, k) {
          return acc + (Number(agents[k].cost) || 0);
        }, 0);
      }

      var totalMessages = sub.messages;
      var totalOutput = sub.output_tokens || sub.output;
      if (totalMessages == null) {
        totalMessages = Object.keys(agents).reduce(function (acc, k) { return acc + (Number(agents[k].messages) || 0); }, 0);
      }
      if (totalOutput == null) {
        totalOutput = Object.keys(agents).reduce(function (acc, k) { return acc + (Number(agents[k].output_tokens) || 0); }, 0);
      }

      var hero =
        '<div class="cost-hero">' +
          '<div class="cost-hero-label">Teljes pipeline költség</div>' +
          '<div class="cost-hero-value">' + money(totalCost) + " <span>USD</span></div>" +
          '<div class="cost-hero-sub">' + fmt(totalMessages) + " üzenet · " + fmt(totalOutput) + " output token</div>" +
        "</div>";

      // Order known agents first, then add anything else
      var order = ["aiO", "Ralph", "aiQAO", "planner"];
      var rowsSource = order.filter(function (k) { return agents[k]; });
      Object.keys(agents).forEach(function (k) { if (rowsSource.indexOf(k) === -1) rowsSource.push(k); });

      var rows = rowsSource.map(function (name) {
        var a = agents[name];
        return "<tr>" +
          '<td class="agent-name">' + esc(name) + "</td>" +
          '<td class="model">' + esc(a.model || "") + "</td>" +
          '<td class="num">' + fmt(a.messages) + "</td>" +
          '<td class="num">' + fmt(a.output_tokens) + "</td>" +
          '<td class="num">' + fmt(a.cache_read_tokens) + "</td>" +
          '<td class="num">' + fmt(a.cache_create_tokens) + "</td>" +
          '<td class="num cost">' + money(a.cost) + "</td>" +
        "</tr>";
      }).join("");

      var table =
        '<table class="token-table">' +
          "<thead><tr>" +
            "<th>Ágens</th>" +
            "<th>Modell</th>" +
            '<th class="num">Üzenet</th>' +
            '<th class="num">Output token</th>' +
            '<th class="num">Cache read</th>' +
            '<th class="num">Cache create</th>' +
            '<th class="cost">Költség</th>' +
          "</tr></thead><tbody>" +
            rows +
          "</tbody></table>";

      mount.innerHTML = hero + table;
    }
  </script>
</body>
</html>
